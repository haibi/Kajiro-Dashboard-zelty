# =============================================================================
# TEMPLATE de configuration — copier vers secrets.toml et remplir
# Le vrai secrets.toml est dans .gitignore (ne JAMAIS le commiter).
# Sur Streamlit Cloud : Settings → Secrets → coller le contenu complet.
# =============================================================================

# --- Zelty API ----------------------------------------------------------------
ZELTY_API_KEY = "PASTE_YOUR_ZELTY_GROUP_KEY_HERE"
ZELTY_AUTH_SCHEME = "Bearer"
ZELTY_BASE_URL = "https://api.zelty.fr"

# --- Streamlit native auth (st.login) ----------------------------------------
# 1. https://console.cloud.google.com/apis/credentials → Create OAuth client ID
#    Type : Web application
# 2. Authorized redirect URIs :
#       http://localhost:8501/oauth2callback
#       https://kajiro-dashboard.streamlit.app/oauth2callback
# 3. Générer cookie_secret avec : python -c "import secrets;print(secrets.token_urlsafe(48))"
[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "GENERATE_RANDOM_64_CHAR_STRING"

# Provider Google (sous-section obligatoire — st.login("google") la lit)
[auth.google]
client_id = "PASTE_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
client_secret = "PASTE_GOOGLE_CLIENT_SECRET"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# --- Whitelist des emails autorisés ------------------------------------------
# Rôles : "admin" (accès complet) | "viewer" (lecture seule, à venir)
[auth_allowed_users]
"hello@kajirosushi.com" = "admin"
# "autre@kajirosushi.com" = "viewer"
